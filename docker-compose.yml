version: '3.8'
services:
  api:
    build: { context: ./apps/api, dockerfile: Dockerfile }
    ports: ["3001:3001"]
    env_file: [.env.local]
    volumes: ["/tmp/affiliateai:/tmp"]
    restart: unless-stopped
  web:
    image: node:20-alpine
    working_dir: /app
    ports: ["3000:3000"]
    env_file: [.env.local]
    volumes: ["./apps/web:/app", "/app/node_modules", "/app/.next"]
    command: sh -c "npm install && npm run dev"
    depends_on: [api]
